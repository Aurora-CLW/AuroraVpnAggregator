name: Update & Deploy

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'config/**'
      - 'data/sources/**'
      - 'scripts/**'
      - 'src/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install xray-core
        run: |
          curl -L -o /tmp/xray.zip "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip"
          unzip -o /tmp/xray.zip -d /tmp/xray
          chmod +x /tmp/xray/xray
          sudo mv /tmp/xray/xray /usr/local/bin/
          xray version

      - name: Download GeoIP database
        run: |
          mkdir -p data/cache
          curl -L -o data/cache/GeoLite2-City.mmdb \
            "https://git.io/GeoLite2-City.mmdb" || true
        continue-on-error: true

      - name: Clean public docs
        run: |
          rm -f docs/clash.yaml docs/v2ray.txt docs/singbox.json docs/nodes.json docs/stats.json
          rm -rf docs/s

      - name: Restore valid node pool
        run: |
          mkdir -p output
          git fetch origin data --depth=1 2>/dev/null || true
          git show origin/data:valid_pool.json > output/valid_pool.json 2>/dev/null && echo "Restored valid_pool.json" || (rm -f output/valid_pool.json && echo "No existing valid pool")
        continue-on-error: true

      - name: Run aggregator (skip fake tests)
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          AURORA_TOKEN: ${{ secrets.AURORA_TOKEN }}
          AURORA_GH_TOKEN: ${{ secrets.AURORA_GH_TOKEN }}
        run: python scripts/run.py --no-test

      - name: Test nodes with xray
        run: python scripts/test_with_xray.py
        timeout-minutes: 25

      - name: Regenerate subscriptions from tested nodes
        env:
          AURORA_TOKEN: ${{ secrets.AURORA_TOKEN }}
          AURORA_GH_TOKEN: ${{ secrets.AURORA_GH_TOKEN }}
        run: python scripts/run.py --generate-only

      - name: Verify output
        run: |
          echo "=== docs 目录结构 ==="
          find docs -type f | head -20
          echo "=== 安全检查: 确认根目录无敏感文件 ==="
          test ! -f docs/clash.yaml && echo "✓ 根目录无 clash.yaml"
          test ! -f docs/nodes.json && echo "✓ 根目录无 nodes.json"
          test -f docs/index.html && echo "✓ index.html 存在"

      - name: Persist valid node pool
        run: |
          if [ -f output/valid_pool.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git fetch origin data
            git checkout origin/data
            cp output/valid_pool.json valid_pool.json
            git add valid_pool.json
            git commit -m "chore: update valid node pool" || echo "No changes to commit"
            git push origin HEAD:data
            git checkout main
          fi
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
