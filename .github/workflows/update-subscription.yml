name: Update Subscription

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时执行一次
  workflow_dispatch:        # 支持手动触发
  push:
    branches:
      - main
    paths:
      - 'config/**'
      - 'data/sources/**'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download GeoIP database
        run: |
          mkdir -p data/cache
          curl -L -o data/cache/GeoLite2-City.mmdb \
            "https://git.io/GeoLite2-City.mmdb" || true
        continue-on-error: true

      - name: Run aggregator
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: python scripts/run.py

      - name: Generate stats
        run: |
          echo "## 📊 更新统计" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f output/stats.json ]; then
            cat output/stats.json >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Subscription Update #${{ github.run_number }}
          files: |
            output/clash.yaml
            output/v2ray.txt
            output/singbox.json
            output/nodes.json
          body: |
            ## 订阅更新

            更新时间: ${{ github.event.head_commit.timestamp || 'Now' }}

            ### 订阅地址

            - Clash: `https://aurora-clw.github.io/AuroraVpnAggregator/clash.yaml`
            - V2Ray: `https://aurora-clw.github.io/AuroraVpnAggregator/v2ray.txt`
            - Sing-box: `https://aurora-clw.github.io/AuroraVpnAggregator/singbox.json`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
