name: Update Subscription

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时执行一次
  workflow_dispatch:        # 支持手动触发
  push:
    branches:
      - main
    paths:
      - 'config/**'
      - 'data/sources/**'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download GeoIP database
        run: |
          mkdir -p data/cache
          curl -L -o data/cache/GeoLite2-City.mmdb \
            "https://git.io/GeoLite2-City.mmdb" || true
        continue-on-error: true

      - name: Run aggregator
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: python scripts/run.py

      - name: Generate stats
        run: |
          echo "## 📊 更新统计" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f output/stats.json ]; then
            cat output/stats.json >> $GITHUB_STEP_SUMMARY
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.date.outputs.date || 'latest' }}
          name: Subscription Update ${{ github.event.head_commit.message || 'Auto Update' }}
          files: |
            output/clash.yaml
            output/v2ray.txt
            output/singbox.json
            output/nodes.json
          body: |
            ## 订阅更新

            更新时间: ${{ github.event.head_commit.timestamp || 'Now' }}

            ### 订阅地址

            - Clash: `https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/clash.yaml`
            - V2Ray: `https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/v2ray.txt`
            - Sing-box: `https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/singbox.json`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean old releases
        uses: dev-drprasad/delete-older-releases@v0.3.2
        with:
          keep_latest: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
