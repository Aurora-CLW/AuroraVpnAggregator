# Telegram 频道订阅源配置
# 无需任何认证！通过预览页抓取公开频道消息
# 自动尝试多个镜像: telegram.dog (推荐) → t.me (备用)

type: telegram
enabled: true
mode: web  # web (无需认证, 推荐) / telethon (需要 api_id/api_hash)

# Telethon 模式配置 (可选, web 模式不需要)
api_id: ${TELEGRAM_API_ID}
api_hash: ${TELEGRAM_API_HASH}

channels:
  - name: "V2RayTz"
    username: "@v2raytz"
    enabled: true

  - name: "FreeV2rays"
    username: "@freev2rays"
    enabled: true

  - name: "VPNGate"
    username: "@vpngatech"
    enabled: true

  - name: "V2RayNGn"
    username: "@v2rayngn"
    enabled: true

  # 你自己的频道或其他频道, 随时添加
  # - name: "MyChannel"
  #   username: "@my_channel"
  #   enabled: true
