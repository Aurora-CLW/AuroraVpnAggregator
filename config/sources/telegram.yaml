# Telegram 频道订阅源配置
# 支持两种模式:
#   web: 无需认证，通过 t.me/s/ 预览页抓取 (默认)
#   telethon: 需要 api_id/api_hash，完整功能

type: telegram
enabled: true
mode: web  # web (无需认证) 或 telethon

# Telethon 模式配置 (mode: telethon 时需要)
# 获取 api_id/api_hash: https://my.telegram.org/apps
api_id: ${TELEGRAM_API_ID}
api_hash: ${TELEGRAM_API_HASH}

channels:
  # ── Web 模式频道 (只需 username，无需认证) ──

  - name: "V2RayTz"
    username: "@v2raytz"
    max_messages: 50
    enabled: true

  - name: "FreeV2rays"
    username: "@freev2rays"
    max_messages: 50
    enabled: true

  - name: "VPNGate"
    username: "@vpngatech"
    max_messages: 50
    enabled: true

  - name: "ProxyMTProto"
    username: "@proxymtproto"
    max_messages: 30
    enabled: true

  - name: "V2RayNGn"
    username: "@v2rayngn"
    max_messages: 50
    enabled: true

  # ── Telethon 模式频道示例 (需要 mode: telethon) ──
  # - name: "PrivateChannel"
  #   channel_id: -1001234567890
  #   max_messages: 100
  #   keywords:
  #     - "vmess://"
  #     - "vless://"
  #   enabled: true
