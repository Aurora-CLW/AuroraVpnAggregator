# Telegram 频道订阅源配置
# 无需任何认证！
# 抓取方式 (自动尝试):
#   1. RSS API (tg.i-c-a.su) — 无需认证, GitHub Actions 可用
#   2. Web 翻页 — RSS 无结果时自动翻页抓取历史消息
#   3. Telethon — 需要 api_id/api_hash (可选)
#
# 支持两种消息格式:
#   - 直接节点: 消息含 vmess://, vless:// 等协议链接
#   - 订阅链接: 消息含 https:// 订阅 URL, 自动递归 fetch 并解析
#   - 置顶消息: 配置 pinned_url 直接抓取指定消息 (也可从 RSS 消息中的链接自动发现)
#   - 消息链接: RSS 中的"点我传送"等超链接自动跟踪抓取
#
# format 字段 (可选):
#   auto (默认) — 自动检测
#   base64 — Base64 编码
#   clash — Clash YAML
#   singbox — Sing-box JSON
#   urls — 原始 URL 列表
#   用于指定频道消息中订阅链接/文件的解析格式

type: telegram
enabled: true
mode: web

# Telethon 模式配置 (可选, RSS 和 Web 模式不需要)
api_id: ${TELEGRAM_API_ID}
api_hash: ${TELEGRAM_API_HASH}

channels:
  - name: "FreeV2rays"
    username: "@freev2rays"
    enabled: true

  # ProxyShareCN — 每条消息含订阅 URL, 自动递归解析
  - name: "ProxyShareCN"
    username: "@proxyshareCN"
    enabled: true

  # CrackHubCN — "点我传送"链接指向置顶消息, 自动从 RSS 发现并抓取
  - name: "CrackHubCN"
    username: "@crackhub_cn"
    enabled: true

  # FreeVPNjd — RSS 间歇性限流, Web 翻页可获取
  - name: "FreeVPNjd"
    username: "@freeVPNjd"
    enabled: true

  # go4sharing — 消息中含超链接指向订阅页面, 自动跟踪
  - name: "go4sharing"
    username: "@go4sharing"
    enabled: true

  # freeyule — 免费娱乐资源频道
  - name: "FreeYule"
    username: "@freeyule"
    enabled: true

  # wxdy666 — 每日更新大量直接节点 (vless/vmess/ss)
  - name: "Wxdy666"
    username: "@wxdy666"
    enabled: true

  # V2Queen — 频道消息含 v2clash.blog 日期, 自动构造订阅 URL
  - name: "V2Queen"
    username: "@v2queen"
    website_url: "https://proxyqueen.top"
    v2clash: true
    enabled: true

  # 以下频道需要加入才能查看消息 (Web 预览不可用)
  # - name: "ZDYZ2Y"
