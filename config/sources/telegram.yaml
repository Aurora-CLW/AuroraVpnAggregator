# Telegram 频道订阅源配置
# 无需任何认证！
# 抓取方式 (自动尝试):
#   1. RSS API (tg.i-c-a.su) — 无需认证, GitHub Actions 可用
#   2. Web 翻页 — RSS 无结果时自动翻页抓取历史消息
#   3. Telethon — 需要 api_id/api_hash (可选)
#
# 支持两种消息格式:
#   - 直接节点: 消息含 vmess://, vless:// 等协议链接
#   - 订阅链接: 消息含 https:// 订阅 URL, 自动递归 fetch 并解析
#   - 置顶消息: 配置 pinned_url 直接抓取指定消息

type: telegram
enabled: true
mode: web

# Telethon 模式配置 (可选, RSS 和 Web 模式不需要)
api_id: ${TELEGRAM_API_ID}
api_hash: ${TELEGRAM_API_HASH}

channels:
  - name: "V2RayTz"
    username: "@v2raytz"
    enabled: true

  - name: "FreeV2rays"
    username: "@freev2rays"
    enabled: true

  # ProxyShareCN — 每条消息含订阅 URL, 自动递归解析
  - name: "ProxyShareCN"
    username: "@proxyshareCN"
    enabled: true

  # CrackHubCN — 节点在置顶消息, 直接抓取置顶消息
  - name: "CrackHubCN"
    username: "@crackhub_cn"
    pinned_url: "https://t.me/crackhub_cn/7679"
    enabled: true

  # FreeVPNjd — RSS 间歇性限流, Web 翻页可获取
  - name: "FreeVPNjd"
    username: "@freeVPNjd"
    enabled: true

  # hanbaoyun666 — RSS 可用但限流, Web 翻页备用
  - name: "Hanbaoyun666"
    username: "@hanbaoyun666"
    enabled: true

  # 以下频道 RSS 不可用, Web 翻页尝试
  # - name: "ZDYZ2Y"
