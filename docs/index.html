<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora VPN Aggregator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        .content {
            padding: 40px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        .subscription-links {
            display: grid;
            gap: 15px;
        }
        .link-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #667eea;
        }
        .link-card h3 {
            color: #333;
            margin-bottom: 10px;
        }
        .link-card input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            background: white;
        }
        .copy-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .copy-btn:hover {
            background: #5a6fd6;
        }
        .stats {
            background: #f0f4ff;
            border-radius: 12px;
            padding: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .stat-item {
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 8px;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌅 Aurora VPN</h1>
            <p>自动聚合多源 VPN 订阅</p>
        </div>

        <div class="content">
            <div class="section">
                <h2>📥 订阅地址</h2>
                <div class="subscription-links">
                    <div class="link-card">
                        <h3>Clash 订阅</h3>
                        <input type="text" id="clash-url" readonly>
                        <button class="copy-btn" onclick="copyUrl('clash-url')">复制链接</button>
                    </div>
                    <div class="link-card">
                        <h3>V2Ray 订阅</h3>
                        <input type="text" id="v2ray-url" readonly>
                        <button class="copy-btn" onclick="copyUrl('v2ray-url')">复制链接</button>
                    </div>
                    <div class="link-card">
                        <h3>Sing-box 订阅</h3>
                        <input type="text" id="singbox-url" readonly>
                        <button class="copy-btn" onclick="copyUrl('singbox-url')">复制链接</button>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>📊 统计信息</h2>
                <div class="stats" id="stats-container">
                    <p>加载中...</p>
                </div>
            </div>

            <div class="section">
                <h2>📖 使用说明</h2>
                <ol style="line-height: 2; color: #555;">
                    <li>复制上方订阅地址</li>
                    <li>打开你的代理客户端 (Clash/V2RayNG/Sing-box)</li>
                    <li>粘贴订阅地址并更新</li>
                    <li>选择节点开始使用</li>
                </ol>
            </div>
        </div>

        <div class="footer">
            <p>🔄 每 6 小时自动更新 | ⚡ GitHub Actions 驱动</p>
            <p style="margin-top: 10px;">
                <a href="https://github.com/" style="color: #667eea; text-decoration: none;">GitHub 项目</a>
            </p>
        </div>
    </div>

    <script>
        // 设置订阅地址
        const baseUrl = window.location.origin + window.location.pathname.replace('/index.html', '');

        document.getElementById('clash-url').value = baseUrl + '/clash.yaml';
        document.getElementById('v2ray-url').value = baseUrl + '/v2ray.txt';
        document.getElementById('singbox-url').value = baseUrl + '/singbox.json';

        // 加载统计信息
        fetch(baseUrl + '/stats.json')
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('stats-container');
                container.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value">${data.total_nodes || 0}</div>
                            <div class="stat-label">节点总数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${data.avg_latency || 0}ms</div>
                            <div class="stat-label">平均延迟</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${Object.keys(data.by_country || {}).length}</div>
                            <div class="stat-label">国家/地区</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${Object.keys(data.by_type || {}).length}</div>
                            <div class="stat-label">协议类型</div>
                        </div>
                    </div>
                `;
            })
            .catch(() => {
                document.getElementById('stats-container').innerHTML = '<p style="color: #999;">暂无统计数据</p>';
            });

        // 复制链接
        function copyUrl(inputId) {
            const input = document.getElementById(inputId);
            input.select();
            document.execCommand('copy');

            const btn = input.nextElementSibling;
            const originalText = btn.textContent;
            btn.textContent = '已复制!';
            btn.style.background = '#28a745';

            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '#667eea';
            }, 2000);
        }
    </script>
</body>
</html>
